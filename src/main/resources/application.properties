# Server Configuration
server.port=8080
server.servlet.context-path=/

# Spring Data JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5433/user_management
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Application Name
spring.application.name=User Management API
spring.devtools.restart.enabled=false

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Actuator Endpoints (Security-Hardened)
# Only expose health endpoint publicly (basic status only)
management.endpoints.web.exposure.include=health
# Show details only when authenticated (prevents information disclosure)
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
# Additional management endpoints require authentication
management.endpoints.web.base-path=/actuator

# Logging
logging.level.root=INFO
logging.level.com.fiap.challenge=INFO
logging.level.org.springframework.boot.autoconfigure.security=WARN
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n
